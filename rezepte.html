<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rezepte | Dreamlight Companion</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="stars"></div>

<header class="main-header">
    <h1>🍳 Rezepte</h1>
    <p>Gerichte, Zutaten, Energie und Verkaufspreise</p>
</header>

<nav>
    <a href="index.html">🏠 Startseite</a>
    <a href="guides.html">📖 Guides</a>
    <a href="progression.html">🎯 Fortschritt</a>
    <a href="moneyguide.html">💰 Geld Guide</a>
    <a href="items.html">💎 Items</a>
    <a href="biome.html">🗺️ Biome</a>
    <a href="rezepte.html">🍳 Rezepte</a>
    <a href="charaktere.html">👥 Charaktere</a>
    <a href="werkzeuge.html">🛠️ Werkzeuge</a>
    <a href="toplisten.html">🏆 Top-Listen</a>
    <a href="schnipsel.html">✨ Schnipsel</a>
    <a href="kleintiere.html">🐾 Kleintiere</a>
    <a href="wissenshueter.html">📚 Wissenshüter</a>
    <a href="tracker.html">⭐ Tracker</a>
</nav>

<main>

<section class="hero glass">

    <h2>Rezeptsuche</h2>

    <input
        type="text"
        id="recipeSearch"
        placeholder="z.B. Ratatouille, Kürbis, Tomate..."
    >

    <h3 class="filter-title">⭐ Sterne</h3>

    <div class="filter-buttons" id="starFilters">
        <button type="button" data-stars="all" class="active-filter">Alle</button>
        <button type="button" data-stars="1">⭐ 1</button>
        <button type="button" data-stars="2">⭐⭐ 2</button>
        <button type="button" data-stars="3">⭐⭐⭐ 3</button>
        <button type="button" data-stars="4">⭐⭐⭐⭐ 4</button>
        <button type="button" data-stars="5">⭐⭐⭐⭐⭐ 5</button>
    </div>

    <h3 class="filter-title">Sortierung</h3>

    <div class="filter-buttons" id="recipeSortFilters">
        <button type="button" data-sort="name" class="active-filter">A-Z</button>
        <button type="button" data-sort="priceHigh">💰 Wertvollste</button>
        <button type="button" data-sort="energyHigh">⚡ Meiste Energie</button>
        <button type="button" data-sort="starsHigh">⭐ Höchste Sterne</button>
    </div>

    <div id="recipeStats" class="dashboard dashboard-main"></div>

    <div id="recipesContainer" class="cards"></div>

</section>

</main>

<script>
let allRecipes = [];
let selectedStars = "all";
let selectedSort = "name";
let recipeSearchTimeout = null;

document.addEventListener("DOMContentLoaded", async () => {
   const response = await fetch("data/recipes_final.json");
    allRecipes = await response.json();

    document.getElementById("recipeSearch").addEventListener("input", () => {
        clearTimeout(recipeSearchTimeout);

        recipeSearchTimeout = setTimeout(() => {
            filterRecipes();
        }, 250);
    });

    document.querySelectorAll("#starFilters button").forEach(button => {
        button.addEventListener("click", () => {
            selectedStars = button.dataset.stars;

            document.querySelectorAll("#starFilters button").forEach(btn => {
                btn.classList.remove("active-filter");
            });

            button.classList.add("active-filter");

            filterRecipes();
        });
    });

    document.querySelectorAll("#recipeSortFilters button").forEach(button => {
        button.addEventListener("click", () => {
            selectedSort = button.dataset.sort;

            document.querySelectorAll("#recipeSortFilters button").forEach(btn => {
                btn.classList.remove("active-filter");
            });

            button.classList.add("active-filter");

            filterRecipes();
        });
    });

    filterRecipes();
});

function getRecipeName(recipe) {
    return recipe.name_de || recipe.name || "Unbekanntes Rezept";
}

function getRecipeIngredients(recipe) {
    if (Array.isArray(recipe.zutaten_de) && recipe.zutaten_de.length > 0) {
        return recipe.zutaten_de;
    }

    if (Array.isArray(recipe.zutaten) && recipe.zutaten.length > 0) {
        return recipe.zutaten;
    }

    return [];
}

function getRecipeSource(recipe) {
    return recipe.quelle_de || recipe.quelle || recipe.collection || "Unbekannt";
}

function getRecipeDescription(recipe) {
    return recipe.beschreibung_de || recipe.beschreibung || "";
}

function filterRecipes() {
    const searchValue = document.getElementById("recipeSearch").value.toLowerCase();

    let filtered = allRecipes.filter(recipe => {
        const name = String(recipe.name || "").toLowerCase();
        const nameDe = String(recipe.name_de || "").toLowerCase();
        const ingredients = Array.isArray(recipe.zutaten) ? recipe.zutaten.join(" ").toLowerCase() : "";
        const ingredientsDe = Array.isArray(recipe.zutaten_de) ? recipe.zutaten_de.join(" ").toLowerCase() : "";
        const source = String(recipe.quelle || recipe.collection || "").toLowerCase();
        const description = String(recipe.beschreibung || recipe.beschreibung_de || "").toLowerCase();
        const type = String(recipe.typ || recipe.type || "").toLowerCase();

        return (
            name.includes(searchValue) ||
            nameDe.includes(searchValue) ||
            ingredients.includes(searchValue) ||
            ingredientsDe.includes(searchValue) ||
            source.includes(searchValue) ||
            description.includes(searchValue) ||
            type.includes(searchValue)
        );
    });

    if (selectedStars !== "all") {
        filtered = filtered.filter(recipe =>
            Number(recipe.sterne) === Number(selectedStars)
        );
    }

    if (selectedSort === "name") {
        filtered.sort((a, b) => getRecipeName(a).localeCompare(getRecipeName(b)));
    }

    if (selectedSort === "priceHigh") {
        filtered.sort((a, b) => Number(b.verkaufspreis) - Number(a.verkaufspreis));
    }

    if (selectedSort === "energyHigh") {
        filtered.sort((a, b) => Number(b.energie) - Number(a.energie));
    }

    if (selectedSort === "starsHigh") {
        filtered.sort((a, b) => Number(b.sterne) - Number(a.sterne));
    }

    updateRecipeStats(filtered);
    displayRecipes(filtered);
}

function updateRecipeStats(recipes) {
    const container = document.getElementById("recipeStats");

    const bestPrice = [...recipes].sort((a, b) => Number(b.verkaufspreis) - Number(a.verkaufspreis))[0];
    const bestEnergy = [...recipes].sort((a, b) => Number(b.energie) - Number(a.energie))[0];
    const fiveStarCount = recipes.filter(recipe => Number(recipe.sterne) === 5).length;

    container.innerHTML = `
        <div class="dash-card">
            <strong>🍳 Treffer</strong>
            <span>${recipes.length} Rezepte</span>
        </div>

        <div class="dash-card">
            <strong>💰 Wertvollstes</strong>
            <span>${bestPrice ? `${getRecipeName(bestPrice)} (${bestPrice.verkaufspreis})` : "Keine Daten"}</span>
        </div>

        <div class="dash-card">
            <strong>⚡ Meiste Energie</strong>
            <span>${bestEnergy ? `${getRecipeName(bestEnergy)} (${bestEnergy.energie})` : "Keine Daten"}</span>
        </div>

        <div class="dash-card">
            <strong>⭐⭐⭐⭐⭐</strong>
            <span>${fiveStarCount} Treffer</span>
        </div>
    `;
}

function displayRecipes(recipes) {
    const container = document.getElementById("recipesContainer");
    container.innerHTML = "";

    if (recipes.length === 0) {
        container.innerHTML = `
            <div class="card">
                <h3>Keine Rezepte gefunden</h3>
                <p>Versuche einen anderen Suchbegriff oder ändere den Filter.</p>
            </div>
        `;
        return;
    }

    recipes.forEach(recipe => {
        const sterne = "⭐".repeat(Number(recipe.sterne));
        const zutaten = getRecipeIngredients(recipe).join(", ");
        const name = getRecipeName(recipe);
        const source = getRecipeSource(recipe);
        const description = getRecipeDescription(recipe);
        const englishName = recipe.status === "needs_de_translation"
            ? `<p><strong>🇬🇧 Englischer Begriff</strong></p>`
            : "";

        container.innerHTML += `
            <div class="card">

                <div class="item-badge">${sterne}</div>

                <h3>${name}</h3>

                ${englishName}
                <p><strong>🍎 Zutaten:</strong> ${zutaten}</p>
                <p><strong>💰 Verkaufspreis:</strong> ${recipe.verkaufspreis} Sternenmünzen</p>
                <p><strong>⚡ Energie:</strong> ${recipe.energie}</p>
                <p><strong>🎮 Inhalt:</strong> ${source}</p>

                <p class="item-description">${description}</p>

            </div>
        `;
    });
}
</script>

<script src="js/mobilejump.js"></script>

</body>
</html>
